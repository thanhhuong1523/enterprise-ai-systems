components:
  schemas:
    UpdateUserRequest:
      type: object
      properties:
        username:
          type: string
        email:
          type: string
        fullName:
          type: string
        phone:
          type: string
    ApiResponseUser:
      type: object
      properties:
        success:
          type: boolean
        code:
          type: string
        timestamp:
          type: string
        data:
          $ref: '#/components/schemas/User'
        message:
          type: string
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        email:
          type: string
        passwordHash:
          type: string
        role:
          type: string
          enum:
          - SYSTEM_ADMIN
          - ROLE_BOARD
          - ROLE_EMPLOYEE
          - ROLE_DEPT_MANAGER
        departmentId:
          type: string
          format: uuid
        fullName:
          type: string
        phone:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        deletedAt:
          type: string
          format: date-time
    UpdateDocumentRequest:
      type: object
      properties:
        title:
          type: string
    ApiResponseDocument:
      type: object
      properties:
        success:
          type: boolean
        code:
          type: string
        timestamp:
          type: string
        data:
          $ref: '#/components/schemas/Document'
        message:
          type: string
    Document:
      type: object
      properties:
        id:
          type: string
          format: uuid
        businessCode:
          type: string
        title:
          type: string
        fileReference:
          type: string
        fileSize:
          type: integer
          format: int64
        hash:
          type: string
        ownerDepartmentId:
          type: string
          format: uuid
        parentId:
          type: string
          format: uuid
        creatorDepartmentId:
          type: string
          format: uuid
        createdBy:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        deletedAt:
          type: string
          format: date-time
        original:
          type: boolean
        alias:
          type: boolean
    UpdateDepartmentRequest:
      type: object
      properties:
        code:
          type: string
        name:
          type: string
        description:
          type: string
    ApiResponseDepartment:
      type: object
      properties:
        success:
          type: boolean
        code:
          type: string
        timestamp:
          type: string
        data:
          $ref: '#/components/schemas/Department'
        message:
          type: string
    Department:
      type: object
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
        name:
          type: string
        description:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        deletedAt:
          type: string
          format: date-time
    CreateUserRequest:
      type: object
      properties:
        username:
          type: string
        email:
          type: string
        password:
          type: string
        confirmPassword:
          type: string
        role:
          type: string
          enum:
          - SYSTEM_ADMIN
          - ROLE_BOARD
          - ROLE_EMPLOYEE
          - ROLE_DEPT_MANAGER
        departmentId:
          type: string
          format: uuid
        fullName:
          type: string
        phone:
          type: string
    CreateDepartmentRequest:
      type: object
      properties:
        code:
          type: string
        name:
          type: string
        description:
          type: string
    RefreshRequest:
      type: object
      properties:
        refreshToken:
          type: string
    ApiResponseLoginResponse:
      type: object
      properties:
        success:
          type: boolean
        code:
          type: string
        timestamp:
          type: string
        data:
          $ref: '#/components/schemas/LoginResponse'
        message:
          type: string
    LoginResponse:
      type: object
      properties:
        accessToken:
          type: string
        tokenType:
          type: string
        expiresIn:
          type: integer
          format: int64
        refreshToken:
          type: string
        refreshTokenExpiresIn:
          type: integer
          format: int64
        userInfo:
          $ref: '#/components/schemas/UserInfo'
    UserInfo:
      type: object
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        email:
          type: string
        role:
          type: string
          enum:
          - SYSTEM_ADMIN
          - ROLE_BOARD
          - ROLE_EMPLOYEE
          - ROLE_DEPT_MANAGER
        departmentId:
          type: string
          format: uuid
        fullName:
          type: string
        phone:
          type: string
    LogoutRequest:
      type: object
      properties:
        refreshToken:
          type: string
    ApiResponseVoid:
      type: object
      properties:
        success:
          type: boolean
        code:
          type: string
        timestamp:
          type: string
        data:
          type: object
        message:
          type: string
    LoginRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
    CreateAliasRequest:
      type: object
      properties:
        originalDocumentId:
          type: string
          format: uuid
        aliasDepartmentId:
          type: string
          format: uuid
    ApiResponseListUser:
      type: object
      properties:
        success:
          type: boolean
        code:
          type: string
        timestamp:
          type: string
        data:
          type: array
          items:
            $ref: '#/components/schemas/User'
        message:
          type: string
    ApiResponseString:
      type: object
      properties:
        success:
          type: boolean
        code:
          type: string
        timestamp:
          type: string
        data:
          type: string
        message:
          type: string
    ApiResponsePageDocument:
      type: object
      properties:
        success:
          type: boolean
        code:
          type: string
        timestamp:
          type: string
        data:
          $ref: '#/components/schemas/PageDocument'
        message:
          type: string
    PageDocument:
      type: object
      properties:
        totalPages:
          type: integer
          format: int32
        totalElements:
          type: integer
          format: int64
        pageable:
          $ref: '#/components/schemas/PageableObject'
        first:
          type: boolean
        last:
          type: boolean
        numberOfElements:
          type: integer
          format: int32
        size:
          type: integer
          format: int32
        content:
          type: array
          items:
            $ref: '#/components/schemas/Document'
        number:
          type: integer
          format: int32
        sort:
          type: array
          items:
            $ref: '#/components/schemas/SortObject'
        empty:
          type: boolean
    PageableObject:
      type: object
      properties:
        paged:
          type: boolean
        unpaged:
          type: boolean
        pageNumber:
          type: integer
          format: int32
        pageSize:
          type: integer
          format: int32
        offset:
          type: integer
          format: int64
        sort:
          type: array
          items:
            $ref: '#/components/schemas/SortObject'
    SortObject:
      type: object
      properties:
        direction:
