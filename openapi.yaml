        nullHandling:
          type: string
        ascending:
          type: boolean
        property:
          type: string
        ignoreCase:
          type: boolean
    ApiResponseListDocument:
      type: object
      properties:
        success:
          type: boolean
        code:
          type: string
        timestamp:
          type: string
        data:
          type: array
          items:
            $ref: '#/components/schemas/Document'
        message:
          type: string
    ApiResponseListDepartment:
      type: object
      properties:
        success:
          type: boolean
        code:
          type: string
        timestamp:
          type: string
        data:
          type: array
          items:
            $ref: '#/components/schemas/Department'
        message:
          type: string
