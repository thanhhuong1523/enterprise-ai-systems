spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/vcc_eap?currentSchema=public&stringtype=unspecified&connectTimeout=10&socketTimeout=30&tcpKeepAlive=true&reWriteBatchedInserts=true}
    username: ${DB_USERNAME:vcc_admin}
    password: ${DB_PASSWORD:secure_db_password}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: EAP-Hikari-Pool
      maximum-pool-size: 50
      minimum-idle: 10
      idle-timeout: 30000
      max-lifetime: 1800000
      keepalive-time: 30000
      connection-timeout: 5000
      validation-timeout: 3000
      initialization-fail-timeout: 2000
      auto-commit: true
      register-mbeans: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: ${REDIS_TIMEOUT:5000ms}
      lettuce:
        pool:
          max-active: ${REDIS_POOL_MAX_ACTIVE:8}
          max-idle: ${REDIS_POOL_MAX_IDLE:8}
          min-idle: ${REDIS_POOL_MIN_IDLE:0}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true
    baseline-on-migrate: true
    clean-disabled: true
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
      enabled: true

jwt:
  secret: ${JWT_SECRET:vcc-eap-super-secret-signing-key-256-bits-base64-secure-value-safe-for-hs256}
  expiration-ms: 900000 # 15 minutes
  refresh-expiration-ms: 604800000 # 7 days

eap:
  upload:
    dir: ./eap-storage
    temp-dir: ./eap-storage/tmp

logging:
  level:
    root: INFO
    com.vccorp.eap: INFO
    com.vccorp.eap.service.lock: DEBUG
    com.vccorp.eap.service.storage: DEBUG
    com.zaxxer.hikari: INFO
    org.flywaydb: INFO
