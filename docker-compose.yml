version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: vcc-eap-db
    restart: always
    environment:
      POSTGRES_DB: vcc_eap
      POSTGRES_USER: vcc_admin
      POSTGRES_PASSWORD: secure_db_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vcc_admin -d vcc_eap"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: vcc-eap-redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data:
